name: Calidad del portafolio

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Instalar dependencias de documentación
        run: python -m pip install -r requirements.txt -c constraints.txt
      - name: Validar estructura, progreso y privacidad
        run: python scripts/validate_portfolio.py --root .
      - name: Construir MkDocs en modo estricto
        run: python -m mkdocs build --strict
